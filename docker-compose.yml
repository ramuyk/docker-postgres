version: '3.7'

services:
  postgres-prod:
    container_name: postgres-prod
    image: postgres-prod
    build: .
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ./volumes/data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    restart: always

